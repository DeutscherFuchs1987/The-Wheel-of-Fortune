<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог проектов 🎬</title>
    <link rel="stylesheet" href="css/catalog_style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>
    <div class="container">
        <!-- ========== НОВЫЙ ХЕДЕР ========== -->
        <div class="header">
            <div class="header-left">
                <h1>🎬 НАШ КАТАЛОГ</h1>
                <div class="nav-buttons">
                    <a href="index.html" class="nav-btn">🎡 Колесо</a>
                    <a href="catalog.html" class="nav-btn active">📚 Каталог</a>
                    <a href="ratings.html" class="nav-btn">⭐ Оценки</a>
                    <a href="profile.html" class="nav-btn">👤 Профиль</a>
                </div>
            </div>

            <!-- Блок авторизации -->
            <div class="auth-section">
                <div class="auth-buttons" id="authButtons">
                    <button class="auth-btn" onclick="showLoginModal()">🔑 Войти</button>
                    <button class="auth-btn" onclick="showRegisterModal()">📝 Регистрация</button>
                </div>
                <div class="user-info" id="userInfo" style="display: none;">
                    <span class="user-avatar">👤</span>
                    <span class="user-name" id="userName"></span>
                    <span class="user-badge" id="userBadge"></span>
                    <button class="auth-btn-small" onclick="logout()">🚪 Выйти</button>
                </div>
            </div>
        </div>

        <!-- Переключатель режимов (личный/групповой) -->
        <div class="mode-selector">
            <div class="catalog-mode-toggle" id="catalogModeToggle">
                <div class="toggle-track">
                    <div class="toggle-thumb" id="catalogModeThumb"></div>
                </div>
            </div>
            <div class="mode-labels">
                <span class="mode-label personal active">👤 Личный каталог</span>
                <span class="mode-label group">👥 Групповая библиотека</span>
            </div>
            <div class="group-selector" id="groupSelector" style="display: none;">
                <select id="groupSelect" onchange="window.selectGroup(this.value)">
                    <option value="">-- Выберите группу --</option>
                </select>
                <button class="refresh-group-btn" onclick="window.refreshGroupProjects()">🔄</button>
            </div>
        </div>

        <div class="filter-bar">
            <span class="filter-title">📌 Фильтр:</span>
            <div class="filter-buttons" id="filterButtons">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="Фильм">🎬 Фильмы</button>
                <button class="filter-btn" data-filter="Сериал">📺 Сериалы</button>
                <button class="filter-btn" data-filter="Мультфильм">🖍️ Мультфильмы</button>
                <button class="filter-btn" data-filter="Аниме">🇯🇵 Аниме</button>
            </div>
        </div>

        <div class="controls-panel">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="🔍 Поиск фильмов, аниме, сериалов на Кинопоиске...">
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="stats" id="stats"></div>
        </div>

        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>

        <div class="projects-grid" id="projectsGrid"></div>
    </div>

    <!-- Модальные окна авторизации -->
    <div class="modal-overlay" id="modalOverlay" style="display: none;"></div>

    <div class="auth-modal" id="loginModal">
        <div class="auth-modal-content">
            <h3>🔑 Вход</h3>
            <input type="text" id="loginUsername" class="auth-input" placeholder="Логин">
            <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
            <div class="auth-buttons">
                <button class="auth-btn submit" onclick="submitLogin()">Войти</button>
                <button class="auth-btn cancel" onclick="closeAuthModal()">Отмена</button>
            </div>
            <div class="auth-link" onclick="showRegisterModal(); closeAuthModal()">Нет аккаунта? Зарегистрироваться</div>
        </div>
    </div>

    <div class="auth-modal" id="registerModal">
        <div class="auth-modal-content">
            <h3>📝 Регистрация</h3>
            <input type="text" id="regUsername" class="auth-input" placeholder="Логин">
            <input type="password" id="regPassword" class="auth-input" placeholder="Пароль">
            <div class="auth-buttons">
                <button class="auth-btn submit" onclick="submitRegistration()">Зарегистрироваться</button>
                <button class="auth-btn cancel" onclick="closeAuthModal()">Отмена</button>
            </div>
            <div class="auth-link" onclick="showLoginModal(); closeAuthModal()">Уже есть аккаунт? Войти</div>
        </div>
    </div>

    <!-- Модальное окно проекта -->
    <div class="modal-overlay-project" onclick="closeModal()" style="display: none;"></div>
    <div class="modal-container" style="display: none;">
        <div class="project-modal" id="project-modal">
            <!-- Весь контент будет вставлен через JavaScript -->
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/watchProgress.js"></script>
    <script src="js/catalog_script.js"></script>
</body>

</html>
