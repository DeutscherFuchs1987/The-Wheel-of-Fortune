<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cinema Wheel | Оценки фильмов</title>
    <link rel="stylesheet" href="css/rating_style.css">
    <link rel="stylesheet" href="css/tierlist.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="app">
        <!-- Верхняя навигация -->
        <header class="site-header">
            <div class="logo">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">CINEMA WHEEL</span>
            </div>

            <nav class="main-nav">
                <a href="index.html" class="nav-link">Колесо</a>
                <a href="catalog.html" class="nav-link">Каталог</a>
                <a href="ratings.html" class="nav-link active">Оценки</a>
                <a href="profile.html" class="nav-link" id="profileLink">Профиль</a>
            </nav>

            <div class="auth-section">
                <div class="auth-buttons" id="authButtons">
                    <button class="btn-outline" onclick="window.showLoginModal()">Войти</button>
                    <button class="btn-primary" onclick="window.showRegisterModal()">Регистрация</button>
                </div>
                <div class="user-info" id="userInfo" style="display: none;">
                    <div class="user-avatar">👤</div>
                    <span class="user-name" id="userName"></span>
                    <span class="user-badge" id="userBadge"></span>
                    <button class="btn-outline small" onclick="window.logout()">Выйти</button>
                </div>
            </div>
        </header>

        <!-- Переключатель режимов -->
        <div class="mode-bar">
            <div class="mode-switch">
                <div class="catalog-mode-toggle" id="catalogModeToggle">
                    <div class="toggle-track">
                        <div class="toggle-thumb" id="catalogModeThumb"></div>
                    </div>
                </div>
                <div class="mode-labels">
                    <span class="mode-label personal active">Личный каталог</span>
                    <span class="mode-label group">Групповая библиотека</span>
                </div>
            </div>
            <div class="group-selector" id="groupSelector" style="display: none;">
                <select id="groupSelect" onchange="window.selectGroup(this.value)">
                    <option value="">-- Выберите группу --</option>
                </select>
                <button class="btn-icon" onclick="window.refreshGroupProjects()" title="Обновить">🔄</button>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filter-bar">
            <div class="filter-header">
                <span class="filter-icon">🎞️</span>
                <span class="filter-title">Фильтр по типу</span>
            </div>
            <div class="filter-buttons" id="filterButtons">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="Фильм">🎬 Фильмы</button>
                <button class="filter-btn" data-filter="Сериал">📺 Сериалы</button>
                <button class="filter-btn" data-filter="Мультфильм">🖍️ Мультфильмы</button>
                <button class="filter-btn" data-filter="Аниме">🇯🇵 Аниме</button>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-panel">
            <span class="stats-text" id="stats"></span>
            <button class="btn-icon" onclick="window.refreshRatings()" title="Обновить оценки">🔄</button>
        </div>

        <!-- Сетка оценённых фильмов -->
        <div class="ratings-grid" id="projectsGrid">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <span>Загрузка оценок...</span>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <div class="modal-overlay" id="modalOverlay" style="display: none;"></div>

    <!-- Модалка входа (улучшенная) -->
    <div class="auth-modal" id="loginModal">
        <div class="auth-modal-content">
            <button class="modal-close auth-close" onclick="window.closeAuthModal()">✕</button>
            <div class="auth-modal-header">
                <span class="auth-modal-icon">🔑</span>
                <h3>Вход в аккаунт</h3>
            </div>
            <div class="auth-modal-body">
                <div class="auth-error" id="loginError" style="display: none;"></div>
                <input type="text" id="loginUsername" class="auth-input" placeholder="Логин">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
            </div>
            <div class="auth-modal-footer">
                <button class="btn-outline" onclick="window.closeAuthModal()">Отмена</button>
                <button class="btn-primary" onclick="window.submitLogin()">Войти</button>
            </div>
            <div class="auth-modal-link" onclick="window.switchToRegister()">
                Нет аккаунта? <span>Зарегистрироваться</span>
            </div>
        </div>
    </div>

    <!-- Модалка регистрации (улучшенная) -->
    <div class="auth-modal" id="registerModal">
        <div class="auth-modal-content">
            <button class="modal-close auth-close" onclick="window.closeAuthModal()">✕</button>
            <div class="auth-modal-header">
                <span class="auth-modal-icon">📝</span>
                <h3>Регистрация</h3>
            </div>
            <div class="auth-modal-body">
                <div class="auth-error" id="registerError" style="display: none;"></div>
                <input type="text" id="regUsername" class="auth-input" placeholder="Придумайте логин">
                <input type="password" id="regPassword" class="auth-input" placeholder="Придумайте пароль">
                <div class="auth-hint">После регистрации нужно дождаться подтверждения администратором</div>
            </div>
            <div class="auth-modal-footer">
                <button class="btn-outline" onclick="window.closeAuthModal()">Отмена</button>
                <button class="btn-primary" onclick="window.submitRegistration()">Зарегистрироваться</button>
            </div>
            <div class="auth-modal-link" onclick="window.switchToLogin()">
                Уже есть аккаунт? <span>Войти</span>
            </div>
        </div>
    </div>

    <!-- Модалка оценок (детальный просмотр) -->
    <div class="rating-modal" id="ratingModal">
        <div class="rating-modal-content">
            <button class="modal-close" onclick="window.closeRatingModal()">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Кнопка "Наверх" -->
    <div class="back-to-top" id="backToTop">
        <div class="back-to-top-icon">↑</div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/tierlist.js"></script>
    <script src="js/rating_script.js"></script>
</body>

</html>
