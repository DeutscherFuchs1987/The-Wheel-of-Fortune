<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценки фильмов ⭐</title>
    <link rel="stylesheet" href="css/rating_style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>⭐ НАШИ ОЦЕНКИ</h1>
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn">🎡 Колесо</a>
                <a href="catalog.html" class="nav-btn">📚 Каталог</a>
                <a href="ratings.html" class="nav-btn active">⭐ Оценки</a>
                <a href="profile.html" class="nav-btn">👤 Профиль</a>
            </div>

            <!-- Блок авторизации -->
            <div class="auth-section">
                <div class="auth-buttons" id="authButtons">
                    <button class="auth-btn" onclick="showLoginModal()">🔑 Войти</button>
                    <button class="auth-btn" onclick="showRegisterModal()">📝 Регистрация</button>
                </div>
                <div class="user-info" id="userInfo" style="display: none;">
                    <span class="user-avatar">👤</span>
                    <span class="user-name" id="userName"></span>
                    <span class="user-badge" id="userBadge"></span>
                    <a href="profile.html" class="profile-link">👤 Профиль</a>
                    <button class="auth-btn-small" onclick="logout()">Выйти</button>
                </div>
            </div>
        </div>

        <div class="filter-bar">
            <span class="filter-title">📌 Фильтр:</span>
            <div class="filter-buttons" id="filterButtons">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="Фильм">🎬 Фильмы</button>
                <button class="filter-btn" data-filter="Сериал">📺 Сериалы</button>
                <button class="filter-btn" data-filter="Мультфильм">🖍️ Мультфильмы</button>
                <button class="filter-btn" data-filter="Аниме">🇯🇵 Аниме</button>
            </div>
        </div>

        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>

        <div class="stats" id="stats"></div>

        <div class="projects-grid" id="projectsGrid"></div>
    </div>

    <div class="rating-modal" id="ratingModal">
        <button class="close-modal" onclick="closeRatingModal()">✕</button>
        <div id="modalContent"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/rating_script.js"></script>
</body>

</html>
