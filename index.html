<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо Фортуны 🎡</title>
    <link rel="stylesheet" href="css/index_style.css">
</head>

<body>
    <div class="app">

        <div class="header">
            <h1>🎡 КОЛЕСО ФОРТУНЫ</h1>
            <div class="nav-buttons">
                <a href="index.html" class="nav-btn active">🎡 Колесо</a>
                <a href="catalog.html" class="nav-btn ">📚 Каталог</a>
                <a href="ratings.html" class="nav-btn">⭐ Оценки</a>
            </div>
        </div>

        <!-- Панель голосования -->
        <div class="voting-panel">
            <div class="voting-info">
                <span class="voting-title">🗳️ Голосование</span>
                <span class="voting-stats" id="votingStats">0 активных голосов</span>
            </div>
            <div class="voting-actions">
                <button class="voting-btn primary" id="openVoteBtn">🗳️ Голосовать</button>
                <button class="voting-btn secondary" id="resetBoostsBtn">🔄 Сбросить бусты</button>
                <button class="voting-btn secondary" id="showStatsBtn">📊 Статистика</button>
            </div>
            <!-- Индикатор кто голосовал -->
            <div class="voters-indicator" id="votersIndicator" style="display: none;">
                <span>Проголосовали:</span>
                <span class="voters-list" id="votersList"></span>
            </div>
        </div>

        <!-- Объединенная панель: фильтры по типу + переключатель режимов -->
        <div class="filter-panel">
            <div class="filter-section">
                <span class="filter-title">📌 Тип:</span>
                <div class="filter-buttons" id="filter-buttons"></div>
            </div>
            
            <div class="mode-toggle-section">
                <span class="mode-label">🎲 Обычный</span>
                <div class="mode-toggle" id="modeToggle">
                    <div class="toggle-track">
                        <div class="toggle-thumb" id="toggleThumb"></div>
                    </div>
                </div>
                <span class="mode-label elimination-label">⚔️ Исключение</span>
            </div>
        </div>

        <div class="success-message" id="successMessage"></div>

        <div class="controls-panel">
            <div class="slider-control">
                <label>
                    <span>⚡ Скорость вращения</span>
                    <span class="slider-value" id="speedValue">2.0 сек</span>
                </label>
                <input type="range" id="speedSlider" min="0.5" max="4.0" step="0.1" value="2.0">
            </div>
            <div class="slider-control">
                <label>
                    <span>🔄 Количество оборотов</span>
                    <span class="slider-value" id="rotationsValue">8</span>
                </label>
                <input type="range" id="rotationsSlider" min="3" max="15" step="1" value="8">
            </div>
        </div>

        <div class="wheel-container">
            <div class="canvas-wrapper">
                <div class="pointer">
                </div>
                <canvas id="wheelCanvas" width="600" height="600"></canvas>
                <div class="wheel-controls">
                    <button id="spinOnceBtn">🎲 Один выбор</button>
                    <button id="spinEliminateBtn" class="eliminate-mode">⚔️ На исключение</button>
                    <button id="resetWheelBtn">⟲ Сброс колеса</button>
                </div>
                <div class="spin-indicator" id="spinIndicator"></div>
            </div>
            <div class="result-area">
                <div class="result-title">ПОБЕДИТЕЛЬ</div>
                <div class="result-name" id="winnerName">—</div>
                <div id="eliminatedContainer" class="elim-list"></div>
            </div>
        </div>

        <div class="items-pool">
            <h3>📋 Текущие пункты <span class="item-count" id="itemCount">0</span></h3>
            <div class="pool-tags" id="itemPool"></div>
        </div>

        <div class="error-message" id="errorMessage"></div>
    </div>

    <script src="js/index_script.js"></script>
</body>

</html>
